<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Google</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <nav class="top-nav">
      <a href="#">Gmail</a>
      <a href="#">Images</a>
      <div class="apps-icon" aria-label="Applications Google">
        <span></span><span></span><span></span>
        <span></span><span></span><span></span>
        <span></span><span></span><span></span>
      </div>
      <div class="profile-icon" aria-label="Profil utilisateur">
      </div>
    </nav>
  </header>

  <main>
    <img src="images/logo.svg.png" alt="Logo Google" class="google-logo" />

    <div class="search-bar">
      <span class="search-icon">🔎</span>
      <input type="text" placeholder="Effectuez une recherche sur Google ou saisissez une URL" />
      <span class="mic-icon">🎤</span>

    <div class="shortcut">
      <div class="shortcut-circle">+</div>
      <p>Ajouter un raccourci</p>
    </div>
  </main>
<button class="customize-btn">Personnaliser Chrome</button>

</html>
